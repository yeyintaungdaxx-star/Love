<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9acb, #ffc3e6, #ff6fa5, #ffd6ec);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* CARD */
.card {
  width: min(92%, 380px);
  text-align: center;
  padding: 26px;
  border-radius: 24px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  position: relative;
}

h1 {
  font-size: 34px;
  color: white;
  margin-bottom: 10px;
}

p {
  font-size: 20px;
  color: white;
}

/* BUTTON AREA */
.buttons {
  position: relative;
  height: 160px;
  margin-top: 20px;
}

/* BUTTON STYLE */
button {
  width: 130px;
  padding: 12px;
  border: none;
  border-radius: 22px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  position: absolute;
}

/* YES */
#yesBtn {
  left: 10px;
  top: 25px;
  background: white;
  color: #ff4fa3;
}

/* NO (fixed so never disappears) */
#noBtn {
  position: fixed;
  left: 60%;
  top: 55%;
  background: #ff4fa3;
  color: white;
}

/* POPUP IMAGE */
.popup-img {
  position: absolute;
  top: -130px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  border-radius: 16px;
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform: translateX(-50%) scale(0); }
  100% { transform: translateX(-50%) scale(1); }
}

/* YES SCREEN */
.love-screen {
  position: fixed;
  inset: 0;
  background: rgba(255, 0, 120, 0.25);
  backdrop-filter: blur(6px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  text-align: center;
}

.love-screen img {
  width: 220px;
  border-radius: 20px;
  margin-top: 10px;
}

.love-text {
  color: white;
  font-size: 30px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>

  <div class="buttons">
    <button id="yesBtn">Yes 💗</button>
  </div>
</div>

<button id="noBtn">No 😭</button>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let noImg = null;
let index = 0;

const noImages = ["cat1.jpg","cat2.jpg","cat3.jpg","cat4.jpg"];

/* YES */
yesBtn.addEventListener("click", () => {

  const screen = document.createElement("div");
  screen.className = "love-screen";

  screen.innerHTML = `
    <div class="love-text"> အရမ်းချစ်တယ် 💞🎀 </div>
    <img src="love.jpg">
  `;

  document.body.appendChild(screen);
});

/* NO SAFE MOVE */
noBtn.addEventListener("click", () => {

  const btnW = 130;
  const btnH = 50;

  const maxX = window.innerWidth - btnW;
  const maxY = window.innerHeight - btnH;

  const x = Math.max(10, Math.random() * maxX);
  const y = Math.max(10, Math.random() * maxY);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // image change
  if (noImg) noImg.remove();

  noImg = document.createElement("img");
  noImg.src = noImages[index];
  noImg.className = "popup-img";

  document.querySelector(".card").appendChild(noImg);

  index = (index + 1) % noImages.length;
});
</script>

</body>
</html>
