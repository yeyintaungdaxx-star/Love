<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9acb, #ffc3e6, #ff6fa5, #ffd6ec);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  width: min(90%, 360px);
  text-align: center;
  background: rgba(255,255,255,0.25);
  padding: 24px;
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  position: relative;
}

h1, p {
  color: white;
}

.buttons {
  position: relative;
  height: 120px;
  margin-top: 20px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  position: absolute;
}

#yesBtn {
  left: 10px;
  top: 20px;
  background: white;
  color: #ff4fa3;
}

#noBtn {
  right: 10px;
  top: 20px;
  background: #ff4fa3;
  color: white;
}

/* FLOATING HEARTS */
.heart {
  position: fixed;
  top: -20px;
  font-size: 20px;
  animation: fall linear forwards;
  pointer-events: none;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}

/* FULL SCREEN LOVE OVERLAY */
.love-screen {
  position: fixed;
  inset: 0;
  background: rgba(255, 0, 120, 0.15);
  backdrop-filter: blur(6px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  animation: fadeIn 0.5s ease;
  z-index: 999;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.love-text {
  font-size: 28px;
  color: white;
  text-align: center;
  animation: pop 0.6s ease;
}

@keyframes pop {
  0% {transform: scale(0);}
  100% {transform: scale(1);}
}
</style>
</head>

<body>

<div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>

  <div class="buttons">
    <button id="yesBtn">Yes 💗</button>
    <button id="noBtn">No 🙈</button>
  </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

/* NO MOVE ONLY */
noBtn.addEventListener("click", () => {
  const maxX = window.innerWidth - 100;
  const maxY = window.innerHeight - 100;

  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";
  noBtn.style.right = "auto";
});

/* YES BEAUTIFUL ANIMATION */
yesBtn.addEventListener("click", () => {

  // screen overlay
  const screen = document.createElement("div");
  screen.className = "love-screen";
  screen.innerHTML = `
    <div class="love-text">
      💖 ကိုယ်အရမ်းပျော်သွားပြီ 💖<br/>
      မီ ကိုချစ်တယ် 😭💞
    </div>
  `;

  document.body.appendChild(screen);

  // floating hearts
  for(let i = 0; i < 60; i++){
    const h = document.createElement("div");
    h.className = "heart";
    h.innerText = "💗";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 5000);
  }

  // auto remove overlay after a bit
  setTimeout(() => {
    screen.remove();
  }, 4000);

});
</script>

</body>
</html>
