<!DOCTYPE html><html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title><style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9acb, #ffc3e6, #ff6fa5, #ffd6ec);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  text-align: center;
  background: rgba(255,255,255,0.25);
  padding: 32px;
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 2;
}

h1, p { color: white; }

.buttons {
  position: relative;
  height: 80px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  position: absolute;
}

#yesBtn {
  left: 20px;
  background: white;
  color: #ff4fa3;
}

#noBtn {
  right: 20px;
  background: #ff4fa3;
  color: white;
  transition: 0.3s;
}

.heart {
  position: fixed;
  top: -20px;
  font-size: 20px;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}
</style></head><body><audio id="bgMusic" preload="auto">
  <source src="./Love/Perfect.mp3" type="audio/mpeg">
</audio><div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>  <div class="buttons">
    <button id="yesBtn">Yes 💗</button>
    <button id="noBtn">No 🙈</button>
  </div>
</div><script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("bgMusic");

let imageCount = 0;

function playMusic(){
  music.currentTime = 0;
  music.play().catch(()=>{});
}

// ================= YES =================
yesBtn.addEventListener("click", () => {
  playMusic();

  document.body.innerHTML = `
    <div style="text-align:center;color:white;">
      <h1>ကိုယ်အရမ်းပျော်သွားပြီ 😭💞</h1>
      <img src="./Love/love.jpg" style="width:220px;border-radius:20px;margin-top:20px;">
    </div>
  `;

  for(let i=0;i<60;i++){
    const h = document.createElement("div");
    h.className = "heart";
    h.innerText = "💗";
    h.style.left = Math.random()*100 + "vw";
    h.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }
});

// ================= NO =================
function moveNo(){
  const maxX = window.innerWidth - 120;
  const maxY = window.innerHeight - 200;

  noBtn.style.left = Math.random()*maxX + "px";
  noBtn.style.top = Math.random()*maxY + "px";
  noBtn.style.position = "fixed";

  const images = [
    "./Love/cat1.jpg",
    "./Love/cat2.jpg",
    "./Love/cat3.jpg",
    "./Love/cat4.jpg"
  ];

  const img = document.createElement("img");
  img.src = images[Math.floor(Math.random()*images.length)];

  img.style.position = "fixed";
  img.style.left = "50%";
  img.style.top = "50%";
  img.style.transform = "translate(-50%,-50%)";
  img.style.width = "140px";
  img.style.borderRadius = "15px";
  img.style.zIndex = "10";

  document.body.appendChild(img);
  setTimeout(()=>img.remove(),2000);

  imageCount++;
  if(imageCount > 5){
    document.querySelectorAll("img").forEach((i,idx)=>{
      if(idx > 2) i.remove();
    });
    imageCount = 2;
  }
}

noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("touchstart", moveNo);
</script></body>
</html>
