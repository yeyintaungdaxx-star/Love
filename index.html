<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  background: #ffffff;
}

/* CARD */
.card {
  width: min(92%, 400px);
  text-align: center;
  padding: 32px;
  border-radius: 24px;
  background: #ffe6f0;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  position: relative;
}

h1 {
  font-size: 38px;
  color: #ff4fa3;
}

p {
  font-size: 22px;
  color: #444;
}

/* BUTTON AREA */
.buttons {
  position: relative;
  height: 180px;
  margin-top: 25px;
}

/* BUTTON */
button {
  width: 130px;
  padding: 12px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  position: absolute;
  transition: all 0.25s ease; /* 🔥 smooth move */
}

/* YES */
#yesBtn {
  left: 10px;
  top: 30px;
  background: white;
  color: #ff4fa3;
  border: 2px solid #ff4fa3;
}

/* NO */
#noBtn {
  left: 170px;
  top: 30px;
  background: #ff4fa3;
  color: white;
}

/* POPUP IMAGE */
.popup-img {
  position: absolute;
  top: -110px;
  left: 50%;
  transform: translateX(-50%);
  width: 130px;
  border-radius: 16px;
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: translateX(-50%) scale(0); }
  100% { transform: translateX(-50%) scale(1); }
}

/* LOVE SCREEN */
.love-screen {
  position: fixed;
  inset: 0;
  background: rgba(255, 0, 120, 0.08);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

.love-text {
  color: #ff4fa3;
  font-size: 30px;
  font-weight: bold;
}

.love-screen img {
  width: 200px;
  border-radius: 20px;
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>

  <div class="buttons">
    <button id="yesBtn">Yes 💗</button>
    <button id="noBtn">No 😭</button>
  </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let noImg = null;
let index = 0;

const noImages = ["cat1.jpg","cat2.jpg","cat3.jpg","cat4.jpg"];

/* YES CLICK */
yesBtn.addEventListener("click", () => {

  const screen = document.createElement("div");
  screen.className = "love-screen";

  screen.innerHTML = `
    <div class="love-text">အရမ်းချစ်တယ် 🎀💞</div>
    <img src="love.jpg">
  `;

  document.body.appendChild(screen);
});

/* NO MOVE */
noBtn.addEventListener("click", () => {

  const parent = document.querySelector(".buttons");

  const btnW = noBtn.offsetWidth;
  const btnH = noBtn.offsetHeight;

  const maxX = parent.clientWidth - btnW;
  const maxY = parent.clientHeight - btnH;

  let x = Math.random() * maxX;
  let y = Math.random() * maxY;

  // edge padding (မလုံးဝထိပ်မထိ)
  x = Math.max(5, x);
  y = Math.max(5, y);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  // image change
  if (noImg) noImg.remove();

  noImg = document.createElement("img");
  noImg.src = noImages[index];
  noImg.className = "popup-img";

  document.querySelector(".card").appendChild(noImg);

  index = (index + 1) % noImages.length;
});
</script>

</body>
</html>
