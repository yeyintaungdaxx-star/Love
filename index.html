<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9acb, #ffc3e6, #ff6fa5, #ffd6ec);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  text-align: center;
  background: rgba(255,255,255,0.25);
  padding: 32px;
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 10;
}

h1, p { color: white; }

.buttons {
  position: relative;
  height: 80px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  position: absolute;
  transition: 0.3s;
}

#yesBtn {
  left: 20px;
  background: white;
  color: #ff4fa3;
}

#noBtn {
  right: 20px;
  background: #ff4fa3;
  color: white;
}

.heart {
  position: fixed;
  top: -20px;
  font-size: 20px;
  animation: fall linear forwards;
  pointer-events: none;
}

@keyframes fall {
  to {
    transform: translateY(110vh);
    opacity: 0;
  }
}

/* NO image floating */
.no-img {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  border-radius: 15px;
  z-index: 5;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic">
  <source src="Perfect.mp3" type="audio/mpeg">
</audio>

<!-- CLICK SOUND -->
<audio id="clickSound">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>

  <div class="buttons">
    <button id="yesBtn">Yes 💗</button>
    <button id="noBtn">No 🙈</button>
  </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("bgMusic");
const clickSound = document.getElementById("clickSound");

function playMusic(){
  music.currentTime = 0;
  music.play().catch(()=>{});
}

/* YES */
yesBtn.addEventListener("click", () => {
  playMusic();

  document.body.innerHTML = `
    <div style="text-align:center;color:white;">
      <h1>ကိုယ်အရမ်းပျော်သွားပြီ 😭💞</h1>
      <img src="love.jpg" style="width:220px;border-radius:20px;margin-top:20px;">
    </div>
  `;

  for(let i=0;i<60;i++){
    const h = document.createElement("div");
    h.className = "heart";
    h.innerText = "💗";
    h.style.left = Math.random()*100 + "vw";
    h.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  }
});

/* NO */
noBtn.addEventListener("click", () => {

  // sound
  clickSound.currentTime = 0;
  clickSound.play().catch(()=>{});

  // shrink button
  noBtn.style.transition = "all 0.5s ease";
  noBtn.style.transform = "scale(0)";
  noBtn.style.opacity = "0";

  setTimeout(() => {
    noBtn.style.display = "none";
  }, 500);

  // show image TOP CENTER
  const images = ["cat1.jpg","cat2.jpg","cat3.jpg","cat4.jpg"];

  const img = document.createElement("img");
  img.src = images[Math.floor(Math.random()*images.length)];
  img.className = "no-img";

  document.body.appendChild(img);

  setTimeout(() => {
    img.remove();
  }, 2000);
});
</script>

</body>
</html>
