<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9acb, #ffc3e6, #ff6fa5, #ffd6ec);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* CARD */
.card {
  width: min(90%, 360px);
  text-align: center;
  background: rgba(255,255,255,0.25);
  padding: 24px;
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  position: relative;
}

h1, p {
  color: white;
  margin: 10px 0;
}

/* BUTTON AREA */
.buttons {
  position: relative;
  height: 120px;
  margin-top: 20px;
}

/* BUTTONS */
button {
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  position: absolute;
  transition: 0.2s;
  touch-action: manipulation;
}

#yesBtn {
  left: 10px;
  top: 20px;
  background: white;
  color: #ff4fa3;
}

#noBtn {
  right: 10px;
  top: 20px;
  background: #ff4fa3;
  color: white;
}

/* IMAGE */
.no-img {
  position: absolute;
  top: -90px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  border-radius: 15px;
  z-index: 20;
}

/* MOBILE FIX */
@media (max-width: 480px) {
  .card {
    padding: 18px;
  }

  button {
    font-size: 14px;
    padding: 8px 14px;
  }

  .no-img {
    width: 90px;
  }
}
</style>
</head>

<body>

<div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>

  <div class="buttons">
    <button id="yesBtn">Yes 💗</button>
    <button id="noBtn">No 🙈</button>
  </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

/* YES */
yesBtn.addEventListener("click", () => {
  document.body.innerHTML = `
    <div style="text-align:center;color:white;">
      <h1>ကိုယ်အရမ်းပျော်သွားပြီ 😭💞</h1>
      <img src="love.jpg" style="width:220px;border-radius:20px;margin-top:20px;">
    </div>
  `;
});

/* NO MOVE + IMAGE CHANGE */
const images = ["cat1.jpg","cat2.jpg","cat3.jpg","cat4.jpg"];
let imgIndex = 0;
let currentImg = null;

noBtn.addEventListener("click", () => {

  // safe area (mobile + pc)
  const maxX = window.innerWidth - 120;
  const maxY = window.innerHeight - 120;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
  noBtn.style.right = "auto";

  // image change only on click
  if (currentImg) currentImg.remove();

  const img = document.createElement("img");
  img.src = images[imgIndex];
  img.className = "no-img";

  document.querySelector(".card").appendChild(img);
  currentImg = img;

  imgIndex = (imgIndex + 1) % images.length;
});
</script>

</body>
</html>
