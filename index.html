<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9acb, #ffc3e6, #ff6fa5, #ffd6ec);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  text-align: center;
  background: rgba(255,255,255,0.25);
  padding: 32px;
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1, p { color: white; }

.buttons {
  position: relative;
  height: 80px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  position: absolute;
}

#yesBtn {
  left: 20px;
  background: white;
  color: #ff4fa3;
}

#noBtn {
  right: 20px;
  background: #ff4fa3;
  color: white;
}

/* floating hearts */
.hearts::before {
  content: "💖 💕 💗 💓 💞";
  position: fixed;
  width: 100%;
  animation: floatHearts 6s linear infinite;
  font-size: 24px;
}

@keyframes floatHearts {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="hearts"></div>

<audio id="bgMusic" loop>
  <source src="Perfect.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>

  <div class="buttons">
    <button id="yesBtn">Yes 💗</button>
    <button id="noBtn">No 🙈</button>
  </div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("bgMusic");

// YES CLICK
yesBtn.addEventListener("click", () => {
  // play audio (mobile fix)
  music.currentTime = 0;
  music.muted = false;
  music.play().catch(() => {});

  // show result
  document.body.innerHTML = `
    <div style="text-align:center;color:white;">
      <h1>💕 ကိုယ်အရမ်းပျော်သွားပြီ 😭💞</h1>
      <img src="love.jpg" style="width:220px;border-radius:20px;margin-top:20px;">
    </div>
  `;

  // confetti
  for(let i=0;i<40;i++){
    let div = document.createElement("div");
    div.innerHTML = "🎉";
    div.style.position="fixed";
    div.style.left=Math.random()*100+"vw";
    div.style.top="0";
    div.style.fontSize="24px";
    document.body.appendChild(div);
    setTimeout(()=>div.remove(),2000);
  }
});

// NO BUTTON RUN
noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("touchstart", moveNo);

function moveNo(){
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * 200;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  const images = ["cat1.jpg","cat2.jpg","cat3.jpg","cat4.jpg"];
  const randomImg = images[Math.floor(Math.random() * images.length)];

  const img = document.createElement("img");
  img.src = randomImg;

  img.style.position = "fixed";
  img.style.width = "120px";
  img.style.left = Math.random() * 80 + "vw";
  img.style.top = Math.random() * 80 + "vh";

  document.body.appendChild(img);
  setTimeout(() => img.remove(), 2000);
}
</script>

</body>
</html>
