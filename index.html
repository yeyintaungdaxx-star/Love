<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: linear-gradient(135deg, #ff9acb, #ffc3e6);
  overflow: hidden;
}

.card {
  text-align: center;
  background: rgba(255,255,255,0.25);
  padding: 32px;
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  max-width: 320px;
  width: 90%;
}

h1 { color: white; }
p { color: white; }

.buttons {
  position: relative;
  height: 80px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  cursor: pointer;
  position: absolute;
}

#yesBtn {
  left: 20px;
  background: white;
  color: #ff4fa3;
}

#noBtn {
  right: 20px;
  background: #ff4fa3;
  color: white;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="Perfect.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>

  <div class="buttons">
    <button id="yesBtn" onclick="sayYes()">Yes 💗</button>
    <button id="noBtn" onmouseenter="moveNo()" ontouchstart="moveNo()">No 🙈</button>
  </div>
</div>

<script>
function sayYes(){
  const music = document.getElementById("bgMusic");
  music.play();

  document.body.innerHTML = "<h1 style='color:white;text-align:center;'>💕 ကိုယ်အရမ်းပျော်သွားပြီ 😭💞</h1>";
}

function moveNo(){
  const btn = document.getElementById('noBtn');

  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * 200;
  btn.style.left = x + "px";
  btn.style.top = y + "px";

  const images = ["cat1.jpg","cat2.jpg","cat3.jpg","cat4.jpg"];

  const randomImg = images[Math.floor(Math.random() * images.length)];

  const img = document.createElement("img");
  img.src = randomImg;

  img.style.position = "fixed";
  img.style.width = "120px";
  img.style.left = Math.random() * 80 + "vw";
  img.style.top = Math.random() * 80 + "vh";

  document.body.appendChild(img);

  setTimeout(() => img.remove(), 2000);
}
</script>

</body>
</html>
