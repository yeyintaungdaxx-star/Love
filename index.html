<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For မီဟဲကို 💗</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: system-ui, sans-serif;
  overflow: hidden;

  background: linear-gradient(-45deg, #ff9acb, #ffc3e6, #ff6fa5, #ffd6ec);
  background-size: 400% 400%;
  animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.card {
  width: min(90%, 360px);
  text-align: center;
  background: rgba(255,255,255,0.25);
  padding: 24px;
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  position: relative;
}

h1, p { color: white; }

.buttons {
  position: relative;
  height: 140px;
  margin-top: 20px;
}

/* YES */
#yesBtn {
  position: absolute;
  left: 10px;
  top: 20px;
  width: 120px;
  padding: 10px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff4fa3;
  cursor: pointer;
}

/* NO */
#noBtn {
  position: fixed;
  left: 60%;
  top: 55%;
  width: 120px;
  padding: 10px;
  border: none;
  border-radius: 20px;
  background: #ff4fa3;
  color: white;
  cursor: pointer;
  transition: 0.15s;
}

/* POPUP IMAGE */
.popup-img {
  position: absolute;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 140px;
  border-radius: 15px;
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform: translateX(-50%) scale(0); }
  100% { transform: translateX(-50%) scale(1); }
}

/* YES SCREEN */
.love-screen {
  position: fixed;
  inset: 0;
  background: rgba(255, 0, 120, 0.2);
  backdrop-filter: blur(6px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
  animation: fadeIn 0.6s ease;
}

.love-content {
  text-align: center;
  animation: zoomIn 0.5s ease;
}

.love-screen img {
  width: 200px;
  border-radius: 20px;
}

.love-text {
  color: white;
  font-size: 24px;
  margin-bottom: 15px;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes zoomIn {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="card">
  <h1>မီဟဲကို 💖</h1>
  <p>မီ ကိုယ့်ကိုပြန်ချစ်နိုင်မလား? 💌</p>

  <div class="buttons">
    <button id="yesBtn">Yes 💗</button>
  </div>
</div>

<button id="noBtn">No 😭</button>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

let noImg = null;

const noImages = ["cat1.jpg","cat2.jpg","cat3.jpg","cat4.jpg"];
let index = 0;

/* YES */
yesBtn.addEventListener("click", () => {
  const screen = document.createElement("div");
  screen.className = "love-screen";

  screen.innerHTML = `
    <div class="love-content">
      <div class="love-text">အရမ်းချစ်တယ်🎀💞</div>
      <img src="love.jpg">
    </div>
  `;

  document.body.appendChild(screen);
});

/* NO (CENTER AVOID FIX) */
noBtn.addEventListener("click", () => {

  const btnWidth = 120;
  const btnHeight = 50;

  let x, y;

  const safeMargin = 130;

  do {
    x = Math.random() * (window.innerWidth - btnWidth);
    y = Math.random() * (window.innerHeight - btnHeight);

  } while (
    x > window.innerWidth / 2 - safeMargin &&
    x < window.innerWidth / 2 + safeMargin &&
    y > window.innerHeight / 2 - safeMargin &&
    y < window.innerHeight / 2 + safeMargin
  );

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  if (noImg) noImg.remove();

  noImg = document.createElement("img");
  noImg.src = noImages[index];
  noImg.className = "popup-img";

  document.querySelector(".card").appendChild(noImg);

  index = (index + 1) % noImages.length;
});
</script>

</body>
</html>
